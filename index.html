<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Permanente Pro - Supabase</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="chat-container" id="chatContainer">
        <div class="chat-header">
            <span>Supabase Chat Pro</span>
            <div class="header-actions">
                <button class="btn-header" id="musicToggle" title="Música de Fondo">🎵</button>
                <button class="btn-header" id="adminToggle" title="Login Admin">🔑</button>
                <button class="btn-header" id="themeToggle" title="Cambiar tema">🌙</button>
            </div>
        </div>

        <div class="music-bar" id="musicBar">
            <div class="music-search-row">
                <input type="text" id="musicSearch" placeholder="Escribe canción o artista...">
                <button id="searchMusicBtn">Buscar</button>
            </div>
            <div class="music-results" id="musicResults" style="display:none;"></div>
            <audio id="bgAudio" loop controls style="width:100%; margin-top:5px; display:none;"></audio>
        </div>

        <div class="preview-container" id="previewContainer"></div>
        <div class="chat-messages" id="chatMessages">Cargando historial...</div>

        <form class="chat-form" id="chatForm">
            <label class="file-label">
                📎
                <input type="file" id="fileInput" accept="image/*,video/*,application/*" multiple>
            </label>
            <textarea id="msgInput" placeholder="Escribe un mensaje..." autocomplete="off"></textarea>
            <button type="submit" class="btn-submit" id="sendBtn">→</button>
        </form>
    </div>

    <div class="lightbox-modal" id="lightboxModal">
        <button class="lightbox-close" id="lightboxClose">&times;</button>
        <img class="lightbox-content" id="lightboxImg" src="" alt="Vista ampliada" draggable="false">
        <div class="lightbox-hint">Usa la rueda del ratón o desliza para hacer zoom. Arrastra para mover.</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script src="js/config.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/music.js"></script>
    <script src="js/chat.js"></script>

</body>

</html>
