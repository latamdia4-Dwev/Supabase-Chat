<!DOCTYPE html>
<html lang="es" class="dark-mode" style="background-color: #000000; color: #ffffff;">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supabase Chat Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
    <div class="chat-container" id="chatContainer">
        <div class="chat-header">
            <button id="adminToggle">🔑</button>
            <span>Supabase Chat Pro</span>
            <div class="header-actions">
                <button id="musicToggle" title="Radio / Música">🎵</button>
                <button id="themeToggle">☀️</button>
                <button id="hideChatBtn" title="Ocultar chat">🙈</button>
            </div>
        </div>

        <!-- BARRA DE REPRODUCCIÓN PERSISTENTE (solo aparece cuando hay una estación sonando) -->
        <div class="music-player-bar" id="musicPlayerBar" style="display: none;">
            <button id="playPauseBtn">▶</button>
            <span class="current-track" id="currentTrackTitle">Ninguna estación seleccionada</span>
            <div class="volume-control">
                <button id="muteBtn" title="Silenciar">🔊</button>
                <input type="range" id="volumeSlider" min="0" max="100" value="80" title="Volumen">
            </div>
            <audio id="audioPlayer"></audio>
        </div>

        <!-- PANEL DESPLEGABLE DE BÚSQUEDA (se cierra automáticamente al elegir una estación) -->
        <div class="music-panel" id="musicPanel">
            <div class="music-search-row">
                <input type="text" id="musicInput" placeholder="Buscar estación de radio (ej. rock, jazz, noticias)...">
                <button id="searchMusicBtn">Buscar</button>
            </div>
            <div class="radio-results" id="radioResults"></div>
        </div>

        <!-- BARRA PARA CARGAR MENSAJES ANTERIORES (visible cuando hay más historial disponible) -->
        <button class="load-more-bar" id="loadMoreBar" style="display: none;">Cargar mensajes anteriores ↑</button>

        <div class="chat-messages" id="chatMessages"></div>
        <div class="preview-container" id="previewContainer" style="display: none;"></div>
        <form class="chat-form" id="chatForm" onsubmit="return false;">
            <label for="fileInput" class="file-label">➕</label>
            <input type="file" id="fileInput" accept="image/*,video/*" multiple style="display: none;">
            <textarea id="msgInput" placeholder="Escribe un mensaje..." rows="1"></textarea>
            <button id="sendBtn" type="button">Enviar</button>
        </form>

        <!-- PANTALLA DE BLOQUEO POR CONTRASEÑA (cubre el chat al cargar y al ocultarlo) -->
        <div class="lock-overlay" id="lockOverlay" style="display: flex;">
            <div class="lock-box">
                <div class="lock-icon">🔒</div>
                <p class="lock-title">Chat protegido</p>
                <input type="password" id="lockPasswordInput" placeholder="Contraseña" autocomplete="off">
                <button id="lockSubmitBtn">Desbloquear</button>
                <p class="lock-error" id="lockError" style="display: none;">Contraseña incorrecta.</p>
            </div>
        </div>
    </div>

    <!-- MODAL LIGHTBOX PARA VISUALIZAR IMÁGENES -->
    <div class="lightbox" id="lightboxModal">
        <button class="lightbox-close" id="lightboxClose">&times;</button>
        <img class="lightbox-content" id="lightboxImg" src="" alt="">
        <span class="lightbox-hint">Rueda del mouse: zoom · Arrastrar: mover</span>
    </div>

    <script src="js/passwords.js"></script>
    <script src="js/config.js"></script>
    <script src="js/lock.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/music.js"></script>
    <script src="js/chat.js"></script>
</body>

</html>
