<!DOCTYPE html>
<html lang="es" class="dark-mode" style="background-color: #000000; color: #ffffff;">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supabase Chat Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css?v=20260722">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
    <div class="chat-container locked" id="chatContainer">
        <div class="chat-header">
            <button id="adminToggle">🔑</button>
            <span>Supabase Chat Pro</span>
            <div class="header-actions">
                <button id="musicToggle" title="Radio / Música">🎵</button>
                <button id="themeToggle">☀️</button>
                <button id="hideChatBtn" title="Ocultar chat">🙈</button>
            </div>
        </div>

        <!-- BARRA DE REPRODUCCIÓN PERSISTENTE (solo aparece cuando hay una estación sonando) -->
        <div class="music-player-bar" id="musicPlayerBar" style="display: none;">
            <button id="prevTrackBtn" title="Anterior">⏮</button>
            <button id="playPauseBtn">▶</button>
            <button id="nextTrackBtn" title="Siguiente">⏭</button>
            <span class="current-track" id="currentTrackTitle">Ninguna estación seleccionada</span>
            <div class="volume-control">
                <button id="muteBtn" title="Silenciar">🔊</button>
                <input type="range" id="volumeSlider" min="0" max="100" value="80" title="Volumen">
            </div>
            <audio id="audioPlayer"></audio>
        </div>

        <!-- PANEL DESPLEGABLE DE BÚSQUEDA (se cierra automáticamente al elegir una estación/canción) -->
        <div class="music-panel" id="musicPanel">
            <div class="music-tabs">
                <button class="music-tab active" id="tabRadio" data-mode="radio">📻 Radio en vivo</button>
                <button class="music-tab" id="tabSongs" data-mode="songs">🎵 Buscar canciones</button>
            </div>
            <div class="music-search-row">
                <input type="text" id="musicInput" placeholder="Buscar estación de radio (ej. rock, jazz, noticias)...">
                <button id="searchMusicBtn">Buscar</button>
            </div>
            <p class="music-hint" id="musicHint"></p>
            <div class="radio-results" id="radioResults"></div>
        </div>

        <!-- BARRA PARA CARGAR MENSAJES ANTERIORES (visible cuando hay más historial disponible) -->
        <button class="load-more-bar" id="loadMoreBar" style="display: none;">Cargar mensajes anteriores ↑</button>

        <div class="chat-messages" id="chatMessages"></div>
        <div class="preview-container" id="previewContainer" style="display: none;"></div>

        <!-- PANEL DE EMOJIS / STICKERS / GIFS PARA COMPONER MENSAJES -->
        <div class="media-panel" id="mediaPanel">
            <div class="media-tabs">
                <button class="media-tab active" id="tabEmoji" data-mode="emoji">😀 Emojis</button>
                <button class="media-tab" id="tabSticker" data-mode="sticker">🧩 Stickers</button>
                <button class="media-tab" id="tabGif" data-mode="gif">🎞️ GIFs</button>
            </div>
            <div class="media-search-row" id="gifSearchRow" style="display: none;">
                <input type="text" id="gifInput" placeholder="Buscar GIF...">
                <button id="searchGifBtn">Buscar</button>
            </div>
            <div class="media-grid" id="mediaGrid"></div>
        </div>

        <form class="chat-form" id="chatForm" onsubmit="return false;">
            <label for="fileInput" class="file-label">➕</label>
            <button type="button" id="emojiToggle" class="emoji-toggle-btn" title="Emojis, stickers y GIFs">😀</button>
            <input type="file" id="fileInput" accept="image/*,video/*" multiple style="display: none;">
            <textarea id="msgInput" placeholder="Escribe un mensaje..." rows="1"></textarea>
            <button id="sendBtn" type="button">Enviar</button>
        </form>

        <!-- PANTALLA DE BLOQUEO: login real con Supabase Auth (solo contraseña) -->
        <div class="lock-overlay" id="lockOverlay" style="display: flex;">
            <div class="lock-box">
                <div class="lock-icon">🔒</div>
                <p class="lock-title">Chat protegido</p>
                <form id="lockForm" onsubmit="return false;">
                    <input type="password" id="lockPasswordInput" placeholder="Contraseña" autocomplete="current-password">
                    <button id="lockSubmitBtn" type="button">Entrar</button>
                </form>
                <p class="lock-error" id="lockError" style="display: none;">Contraseña incorrecta.</p>
            </div>
        </div>
    </div>

    <!-- MODAL LIGHTBOX PARA VISUALIZAR IMÁGENES -->
    <div class="lightbox" id="lightboxModal">
        <button class="lightbox-close" id="lightboxClose">&times;</button>
        <img class="lightbox-content" id="lightboxImg" src="" alt="">
        <span class="lightbox-hint">Rueda del mouse: zoom · Arrastrar: mover</span>
    </div>

    <!-- CONTROL FLOTANTE DE BRILLO RÁPIDO: baja el brillo de TODA la página
         (filtro CSS, no un overlay que tapa) para que se vea más discreta
         sin dejar de ser legible. Vive fuera del chat, siempre visible. -->
    <div class="floating-dim-controls">
        <button id="dimToggleBtn" class="floating-dim-btn" title="Bajar brillo de la página">🌙</button>
        <input type="range" id="dimIntensitySlider" min="20" max="100" value="45" title="Nivel de brillo">
    </div>

    <script src="js/passwords.js?v=20260722"></script>
    <script src="js/config.js?v=20260722"></script>
    <script src="js/lock.js?v=20260722"></script>
    <script src="js/ui.js?v=20260722"></script>
    <script src="js/music.js?v=20260722"></script>
    <script src="js/chat.js?v=20260722"></script>
    <script src="js/media-picker.js?v=20260722"></script>
</body>

</html>
